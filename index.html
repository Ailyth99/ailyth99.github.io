<!DOCTYPE html>
<html>
<head>
    <title>Powerless</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica', sans-serif;
            background-color: #000;
            color: white;
        }

        .container {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .anime-bg {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 100vh;
            opacity: 0.9;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 2rem;
            max-width: 50%;
        }

        .icon {
            width: 40px;
            height: 40px;
            margin: 10px;
            filter: invert(1);
            transition: transform 0.3s;
        }

        .icon:hover {
            transform: scale(1.1);
        }

        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .floating-item {
            position: absolute;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="floating-elements">
        </div>
        
        <div class="content">
            <h1>nothing here yet</h1>
        
        </div>
        
        <img src="./pic/cof.jpg" class="anime-bg" alt="Anime Style Background">
    </div>
</body>
</html>
