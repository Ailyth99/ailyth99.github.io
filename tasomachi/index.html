<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>黄昏ニ眠ル街 收集地图</title>
<link rel="shortcut icon" href='./tiles/images/shorc.png' />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Catamaran&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./tiles/leaflet.css"/>
<link rel="stylesheet" href="./tiles/style.css"/>
<link rel="stylesheet" href="./tiles/tx2d/leaflet-search.css">
<script src="./tiles/leaflet.js" ></script>
<script src="./tiles/tx2d/leaflet-search.js"></script>
<script src="./tiles/data.js"></script>
</head>
<body>
<div id="coodL"></div>
<div id="lmap"></div>
<div id="side" class="panel">
    <div class="panelContent">
        <div><img src="./tiles/images/twilightcover.jpg"> </div>
        <div class="panelContentTitleX">黄昏沉眠街 - 互动收集地图 </div>
        <div class="panelContentTitle">当前显示区域 点击以切换</div>
        <div class="btnGroup">
            <div class="switch-field">
                <input type="radio" id="radio-three" name="switch-two"   onclick="mapShow('1')" checked/>
                <label for="radio-three">潮风<br> Shiokaze</label>
                <input type="radio" id="radio-four" name="switch-two"  onclick="mapShow('2')" />
                <label for="radio-four">双子<br>Futago</label>
                <input type="radio" id="radio-five" name="switch-two"  onclick="mapShow('3')" />
                <label for="radio-five">弦月<br>Gengetsu</label>
               
            </div>
        </div>
        <hr style="width: 200px;margin: 0.5rem auto;border: 1px solid #E4A23D">
        <div class="kensaku" id="kensaku"></div>
        <h5>收集物 - 奖杯相关 -</h5>
        <hr>
        <div class="itemGroup" id="groupShio" style="display: block;" >
            
            <div class="items"  id="she" onclick="henkanki('she')"  value="show" name="shiokaze">潮风地能<div class="sqr" id="sheSQ" name="shiokazeSQ"></div></div>
            <div class="items"  id="shc" onclick="henkanki('shc')"  value="show" name="shiokaze">潮风衣服<div class="sqr" id="shcSQ" name="shiokazeSQ"></div></div>
            <div class="items"  id="shf" onclick="henkanki('shf')"  value="show" name="shiokaze">潮风家具<div class="sqr" id="shfSQ" name="shiokazeSQ"></div></div>
            <div class="items"  id="shn" onclick="henkanki('shn')"  value="show" name="shiokaze">潮风笔记<div class="sqr" id="shnSQ" name="shiokazeSQ"></div></div>
            <div class="items"  id="sho" onclick="henkanki('sho')"  value="show" name="shiokaze">潮风损坏地能<div class="sqr" id="shoSQ" name="shiokazeSQ"></div></div>
        </div>

        <div class="itemGroup" id="groupFu" style="display: none;" >
            
            <div class="items"  id="fue" onclick="henkanki('fue')"  value="show" name="futago">双子地能<div class="sqr" id="fueSQ" name="futagoSQ"></div></div>
            <div class="items"  id="fuc" onclick="henkanki('fuc')"  value="show" name="futago">双子衣服<div class="sqr" id="fucSQ" name="futagoSQ" ></div></div>
            <div class="items"  id="fuf" onclick="henkanki('fuf')"  value="show"  name="futago">双子家具<div class="sqr" id="fufSQ" name="futagoSQ"></div></div>
            <div class="items"  id="fun" onclick="henkanki('fun')"  value="show" name="futago">双子笔记<div class="sqr" id="funSQ" name="futagoSQ" ></div></div>
            <div class="items"  id="fuo" onclick="henkanki('fuo')"  value="show"  name="futago">双子损坏地能<div class="sqr" id="fuoSQ" name="futagoSQ"></div></div>
             
        </div>

        <div class="itemGroup" id="groupGen" style="display: none;" >
            
            <div class="items"  id="gee" onclick="henkanki('gee')"  value="show" name="gen">弦月地能<div class="sqr" id="geeSQ" name="genSQ"></div></div>
            <div class="items"  id="gec" onclick="henkanki('gec')"  value="show" name="gen">弦月衣服<div class="sqr" id="gecSQ" name="genSQ"></div></div>
            <div class="items"  id="gef" onclick="henkanki('gef')"  value="show" name="gen">弦月家具<div class="sqr" id="gefSQ" name="genSQ"></div></div>
            <div class="items"  id="gen" onclick="henkanki('gen')"  value="show" name="gen">弦月笔记<div class="sqr" id="genSQ" name="genSQ"></div></div>
            <div class="items"  id="geo" onclick="henkanki('geo')"  value="show" name="gen">弦月损坏<div class="sqr" id="geoSQ" name="genSQ"></div></div>
        </div>

        </div>

</div>

<div id="sideM" value="hidden">
<div class="sideDefault">
        <img src="./tiles/images/GHOSTWIRE_TOKYO_logo.jpg.png">
        <div id="menuMbtn" class="topBtn"  onclick="menuM()">菜单</div>
</div>

<div id="kensakuM" value="hidden"></div>

<div id="menuM" value="hidden">
<div class="menuContent">

    <h5>收集物 - 奖杯相关 -</h5>
    <hr>
    
</div>
</div>

</div>


<div id="slider" class="sliderX" onclick="sliderX()"></div></div>
<div id="sliderM" class="sliderM" onclick="sliderM()"></div></div>

<script src="./tiles/twilight.js"></script>
<script src="./tiles/tx2d/dummy.js"></script>
</body>
</html>
