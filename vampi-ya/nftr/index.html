<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NDS NFTR Patcher</title>
    <link rel="stylesheet" href="style.css">
    <script src="nftr_core.js" defer></script>
</head>
<body>
    <aside class="sidebar">
        <h1>NFTR Patcher</h1>
        <div class="card">
            <div class="card-title">源字库 (NFTR)</div>
            <input type="file" id="nftrFile" accept=".nftr,.bin">
            <button id="btnExportDict" class="btn-export hidden">📥 导出原始字典 (CSV)</button>
        </div>
        <div class="card">
            <div class="card-title">汉化映射表 (CSV)</div>
            <input type="file" id="csvFile" accept=".csv,.txt">
        </div>
        <div class="card log-card">
            <div class="card-title">执行日志</div>
            <div id="logOutput" class="log-output">NFTR Patcher ALPHA 0.3</div>
        </div>
        <div class="action-area">
            <button id="btnFullRegen" class="btn-success" disabled>♻️ 全量自动重生成</button>
            <button id="btnProcess" class="btn-primary" disabled>⚡ 执行 CSV 批量替换</button>
            <button id="btnSave" class="btn-success" disabled>💾 保存修改版 NFTR</button>
        </div>
    </aside>

    <main class="main-workspace">
        <header class="toolbar">
            <div class="toolbar-group">
                <label>字体:</label>
                <select id="fontFamily" style="width: 100px;"></select>
                <button id="btnLoadSysFonts" class="btn-small">获取系统字体</button>
            </div>
            <div class="toolbar-group"><label>字号:</label><input type="number" id="fontSize" value="12" class="num-input"></div>
            <div class="toolbar-group"><label>偏移:</label><input type="number" id="offsetX" value="0" class="num-input"><input type="number" id="offsetY" value="0" class="num-input"></div>
            <div class="toolbar-group"><label>间距:</label><input type="number" id="letterSpacing" value="0" class="num-input"></div>
            <div class="toolbar-group"><label>阈值:</label><input type="number" id="alphaThreshold" value="160" min="1" max="255" class="num-input"></div>
            <div class="toolbar-group">
                <label style="cursor:pointer"><input type="checkbox" id="purePixel" checked>点阵</label>
                <label style="cursor:pointer"><input type="checkbox" id="fixedWidth" checked>等宽</label>
            </div>
            <div class="toolbar-group" style="border-left: 1px solid #666; padding-left:8px">
                <button id="btnGlobalSpacing" class="btn-small btn-success">🌐 间距修正</button>
                <button id="btnGenerateShadow" class="btn-small btn-primary" style="background:#5a4a7a">🌑 阴影生成(BUG)</button>
            </div>
            <div class="toolbar-group" style="margin-left:auto">
                <button id="btnClearFont" class="btn-danger btn-small" disabled>清空字库</button>
            </div>
        </header>

        <div class="canvas-container" id="canvasContainer">
            <div id="emptyState" style="text-align:center; color:#555; margin-top:100px"><h3>请在左侧载入 NFTR 字库文件</h3></div>
            <canvas id="previewCanvas"></canvas>
        </div>
        
        <footer class="statusbar">
            <span id="statusText">等待载入...</span>
            <span id="statsText">总数: 0 | 已改: 0</span>
        </footer>
    </main>
</body>
</html>
